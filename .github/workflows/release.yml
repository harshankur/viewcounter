name: Release

# Releases are driven by the version field in package.json, not by tagging
# manually. When this workflow is run, if package.json carries a version that
# has no matching git tag yet, that version is tested, published to npm with
# provenance, tagged, and given a GitHub Release — in that order. Publish runs
# BEFORE tagging deliberately: if publish fails, nothing is left dangling. A
# tag created before a failed publish blocks every retry afterward, because the
# next run's "does this tag already exist" check reports the version as
# already released when it never actually reached npm.
#
# It is currently triggered manually only (see the `on:` block below).
#
# To cut a release:
#   npm version patch|minor|major   # bumps package.json, commits, tags locally
#   git push                        # lands the bump
#   gh workflow run release.yml     # publishes it
#
# A push whose version already has a tag is a no-op, so ordinary commits and
# re-runs never republish.
#
# Publishing is deliberately manual. The automatic push trigger is commented out
# rather than deleted: an npm version number can never be reused, so a release
# should be an act of intent, not a side effect of merging. Uncomment it if you
# would rather every version bump on master ship automatically.
#
# Authentication requires no secret. The package is bound to this repository and
# this workflow file via npm Trusted Publishing (OIDC), so there is no NPM_TOKEN
# to rotate, leak, or have restricted by npm's 2FA-bypass token deprecation.
on:
  # push:
  #   branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Never let two releases race; a half-published version cannot be taken back.
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check for a new version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Tags are needed to tell an already-released version from a new one.
          fetch-depth: 0
          persist-credentials: false

      - name: Compare package.json version against existing tags
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "$TAG already exists - nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "$TAG is new - releasing $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Require a changelog entry for the new version
        if: steps.version.outputs.should_release == 'true'
        run: |
          # A release with no release notes is a release nobody can review.
          if ! grep -q "^## \[${{ steps.version.outputs.version }}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${{ steps.version.outputs.version }}]' section"
            exit 1
          fi

  verify:
    name: Verify release
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx jest --ci --coverage
        env:
          NODE_ENV: test

      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Assert no secrets in the tarball
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          FILES=$(node -e "console.log(require('/tmp/pack.json')[0].files.map(f=>f.path).join('\n'))")
          echo "$FILES"
          if echo "$FILES" | grep -qE '^(dbInfo|allowed)\.json$|^\.env$|^\.visitor-secret$'; then
            echo "::error::Refusing to publish - real config or secret present in tarball"
            exit 1
          fi

  publish:
    name: Tag and publish
    needs: [check, verify]
    runs-on: ubuntu-latest
    environment: release        # lets you require a manual approval on npm pushes
    permissions:
      contents: write           # push the tag, create the GitHub Release
      id-token: write           # OIDC: authenticates to npm AND signs provenance
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # setup-node writes `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # into .npmrc whenever registry-url is set — even when NODE_AUTH_TOKEN is
      # undefined, leaving an EMPTY token line. npm reads that and concludes
      # "token auth is already configured", so it never starts the OIDC exchange
      # and the publish fails as unauthenticated (actions/setup-node#1551).
      # Stripping the line is the documented workaround and is what makes
      # Trusted Publishing actually engage.
      - name: Clear the empty auth token so OIDC can engage
        run: |
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC" ]; then
            sed -i '/_authToken/d' "$NPMRC"
            echo "Stripped _authToken from $NPMRC"
          fi

      # Auth is OIDC (npm Trusted Publishing). No token is stored anywhere: the
      # npm CLI detects the OIDC environment, exchanges the id-token for a
      # short-lived registry credential, and publishes. Configured at
      #   npmjs.com > @harshankur/viewcounter > Settings > Trusted Publisher
      # bound to this repository and this workflow file. Requires id-token:
      # write above, npm >= 11.5.1 and Node >= 22.14.0 (Node 24 satisfies both).
      #
      # Deliberately NO NODE_AUTH_TOKEN here. npm docs are explicit that the
      # publish step should not set it under trusted publishing, and a stale or
      # empty value actively suppresses the OIDC exchange (see the step above).
      #
      # --provenance attaches the signed SLSA attestation linking the tarball to
      # this exact commit, workflow, and runner. Under trusted publishing npm
      # generates provenance automatically, but the flag is kept explicit so the
      # intent survives any future change to that default.
      - name: Publish to npm
        run: npm publish --provenance --access public

      # Only reached after a successful publish, so a failure above never
      # leaves a tag with nothing published behind it.
      - name: Create and push the tag
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          # Pull just this version's section out of the changelog for the notes.
          NOTES=$(awk -v v="## [$VERSION]" '
            index($0, v) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          printf '%s\n' "$NOTES" > /tmp/notes.md
          gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md
